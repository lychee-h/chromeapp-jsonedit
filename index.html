<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="utf-8">

  <title>JSONEditor</title>

  <script src="./resources/cache.js"></script>
  

  <link href="./resources/jsoneditor.css" rel="stylesheet" type="text/css">
  <link href="./resources/main.css" rel="stylesheet" type="text/css">
  <link href="./resources/toast.min.css" rel="stylesheet" type="text/css">
  
  <script src="./resources/localforage.min.js"></script>
  <script src="./resources/jsoneditor.js"></script>
  <script src="./resources/toast.min.js"></script>

  

  <style type="text/css">
    body {
      font: 10.5pt arial;
      color: #4d4d4d;
      line-height: 150%;
      width: 100%;
      height: 100vh; 
      margin: 0px;
    }

    code {
      background-color: #f5f5f5;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="left-pane">
    <div id="jsoneditor-code"></div>
  </div>
  <div id="right-pane">
    <div id="right-toolbar">
      <div class="toolbar-group">
        <button id="btn-expand" class="toolbar-btn">展开树</button>
        <button id="btn-collapse" class="toolbar-btn">合并树</button>
      </div>
      <div class="toolbar-group toolbar-search">
        <input id="search-input" type="text" placeholder="搜索关键词" />
        <span id="search-count"></span>
      </div>
    </div>
    <div id="jsoneditor-view"></div>
  </div>
</div>
<script src="./resources/main.js"></script>
</body>
</html>
